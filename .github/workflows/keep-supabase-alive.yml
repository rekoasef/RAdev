name: Keep Supabase alive

on:
  schedule:
    # Corre cada 5 días a las 12:00 UTC
    # Supabase pausa proyectos inactivos después de 7 días
    - cron: '0 12 */5 * *'
  workflow_dispatch: # Permite correrlo manualmente desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (consulta simple para marcar actividad)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/projects?select=id&limit=1" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}")
          echo "Supabase respondió con status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Advertencia: respuesta inesperada ($STATUS). El proyecto puede estar pausado."
            exit 1
          fi
          echo "Supabase está activo."
